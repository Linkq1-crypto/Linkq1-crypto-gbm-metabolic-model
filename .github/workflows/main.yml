name: ARES Scientific Audit CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
# Usiamo pip per velocità nell'Action, installando i core necessari
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib cobra optlang lxml

    - name: Run Metabolic Pipeline & Audit
      run: |
# Esporta il path per trovare i moduli in src e tests
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python pipeline.py

    - name: Check Audit Results
      run: |
        if grep -q "FAIL" SECURITY_AUDIT.md; then
          echo "Audit failed!"
          exit 1
        else
          echo "Audit passed successfully."
        fi